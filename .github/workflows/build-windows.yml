name: Build Windows

# Tauri 无法从 macOS 交叉编译到 Windows，故 Windows 安装包必须在 windows runner 上构建。
# 手动触发，或推 v* tag 时自动构建。产物为 NSIS 安装包（.exe），上传为 artifact。
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust (msvc target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo / rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install JS deps (app + frontend + server)
        run: |
          npm ci
          npm ci --prefix frontend
          npm ci --prefix server

      # 编译 Node 后端 + 装 Windows ABI 的 better-sqlite3 + 取 win-x64 node.exe 运行时
      - name: Build sidecar
        run: node scripts/build-sidecar.mjs

      - name: Build frontend
        run: npm run build:web

      # --bundles nsis 覆盖 tauri.conf.json 里的 dmg target，仅产出 Windows 安装包
      - name: Tauri build (NSIS)
        run: npx tauri build --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TaskDeck-windows-nsis
          path: app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Commit installer to release branch
        if: github.ref_name == 'feature/windows-v1.0.2'
        shell: pwsh
        working-directory: .
        run: |
          $releaseBranch = "release/windows-v1.0.2"
          $installer = Get-ChildItem "app/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not found."
          }

          $tmpInstaller = Join-Path $env:RUNNER_TEMP $installer.Name
          Copy-Item $installer.FullName $tmpInstaller -Force

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin $releaseBranch
          if ($LASTEXITCODE -eq 0) {
            git switch -C $releaseBranch FETCH_HEAD
          } else {
            git switch -c $releaseBranch
          }

          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item $tmpInstaller (Join-Path "artifacts" $installer.Name) -Force

          git add artifacts/*.exe
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Installer is already up to date on $releaseBranch."
            exit 0
          }

          git commit -m "release: add Windows installer v1.0.2"
          git push origin "HEAD:$releaseBranch"
